<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاری ئۆنلاینی کوردی</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { text-align: center; padding: 30px; border: 2px solid #f5c518; border-radius: 20px; background: #222; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #f5c518; color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .p-card { background: #333; padding: 10px; margin: 5px 0; border-radius: 10px; border-right: 4px solid #f5c518; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyClW8-RvknN9aQ63eXm7ziH9PoC",
            authDomain: "kurdish-game-5206a.firebaseapp.com",
            projectId: "kurdish-game-5206a",
            storageBucket: "kurdish-game-5206a.appspot.com",
            messagingSenderId: "706151709173",
            appId: "1:706151709173:web:879ee5b406d6aa",
            databaseURL: "https://kurdish-game-5206a-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [room, setRoom] = React.useState('');
            const [name, setName] = React.useState('');
            const [joined, setJoined] = React.useState(false);
            const [players, setPlayers] = React.useState({});

            React.useEffect(() => {
                if (joined && room) {
                    db.ref('rooms/' + room + '/players').on('value', (s) => {
                        if (s.val()) setPlayers(s.val());
                    });
                }
            }, [joined, room]);

            const join = () => {
                if (name && room) {
                    db.ref(`rooms/${room}/players/${name}`).set({ name });
                    setJoined(true);
                }
            };

            if (!joined) return (
                <div className="box">
                    <h2 style={{color: '#f5c518'}}>بەخێربێیت 🎮</h2>
                    <input placeholder="ناوت" onChange={e => setName(e.target.value)} />
                    <input placeholder="کۆدی ژوور" onChange={e => setRoom(e.target.value)} />
                    <button onClick={join}>دەستپێکردن</button>
                </div>
            );

            return (
                <div className="box">
                    <h3 style={{color: '#f5c518'}}>ژووری: {room}</h3>
                    {Object.values(players).map((p, i) => <div key={i} className="p-card">{p.name} ✅</div>)}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
